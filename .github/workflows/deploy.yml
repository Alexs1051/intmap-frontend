name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Copy assets to dist
        run: |
          # Создаём директории
          mkdir -p dist/models
          mkdir -p dist/icons
          
          # Копируем модель
          if [ -f "public/models/building.glb" ]; then
            cp public/models/building.glb dist/models/
            echo "✅ Model copied"
          else
            echo "⚠️ Model not found at public/models/building.glb"
          fi
          
          # Копируем все иконки
          if [ -d "public/icons" ]; then
            cp -r public/icons/* dist/icons/
            echo "✅ Icons copied: $(ls public/icons | wc -l) files"
          else
            echo "⚠️ Icons directory not found at public/icons"
          fi
          
          # Выводим содержимое для отладки
          echo "=== dist/models ==="
          ls -la dist/models/ || echo "empty"
          echo "=== dist/icons ==="
          ls -la dist/icons/ || echo "empty"

      - name: Create .nojekyll file
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4