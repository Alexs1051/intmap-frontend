name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Ensure models directory exists
        run: |
          mkdir -p dist/models
          # Копируем модель из исходников
          if [ -f "public/models/building.glb" ]; then
            cp public/models/building.glb dist/models/
            echo "Model copied successfully"
          else
            echo "WARNING: Model file not found at public/models/building.glb"
            # Создаём файл-заглушку, чтобы не было 404
            echo "Model not found" > dist/models/building.glb.txt
          fi
          ls -la dist/models/

      - name: Create .nojekyll file
        run: touch dist/.nojekyll

      - name: Debug - list dist contents
        run: |
          echo "=== Contents of dist ==="
          ls -la dist/
          echo "=== Contents of dist/models ==="
          ls -la dist/models/ || echo "models directory not found"
          echo "=== bundle.js exists ==="
          ls -la dist/bundle.js || echo "bundle.js not found!"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4