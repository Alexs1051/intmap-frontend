<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>IntMap</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    /* Critical styles: loading & error screens (shown before JS bundle loads) */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    #app-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: opacity 0.5s ease;
    }

    #app-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    .loading-title {
      color: #fff;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .loading-status {
      color: #888;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .loading-bar-container {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      width: 0%;
      height: 100%;
      background: #e94560;
      transition: width 0.3s ease;
    }

    .loading-percent {
      color: #e94560;
      font-size: 12px;
      margin-top: 8px;
      font-family: monospace;
    }

    #app-error {
      position: fixed;
      top: 96px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff4444;
      color: white;
      padding: 16px 24px;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      z-index: 20001;
      box-shadow: 0 4px 20px rgba(255, 68, 68, 0.4);
      max-width: 90%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: slideDown 0.3s ease-out;
    }

    #app-error.hidden {
      display: none;
    }

    #app-error .error-icon {
      font-size: 24px;
    }

    #app-error .error-message {
      font-size: 14px;
      font-weight: 500;
      word-break: break-word;
    }

    #app-error .error-hint {
      font-size: 12px;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .loading-bar-container {
        width: 250px;
      }

      #app-error {
        top: 74px;
      }
    }
  </style>
</head>

<body>
  <div id="app-loading">
    <div class="loading-spinner"></div>
    <div class="loading-title">IntMap</div>
    <div class="loading-status" id="loading-status">Инициализация...</div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
    <div class="loading-percent" id="loading-percent">0%</div>
  </div>
  <div id="app-error" class="hidden">
    <div class="error-icon">❌</div>
    <div class="error-message" id="error-message"></div>
    <div class="error-hint">Произошла критическая ошибка. Попробуйте обновить страницу.</div>
  </div>
  <div id="debug">Loading...</div>
  <script src="bundle.js"></script>
</body>

</html>
