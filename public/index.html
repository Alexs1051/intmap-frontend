<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D Map with Babylon.js</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="styles/global.css">
</head>

<body>
  <div id="app-loading">
    <div class="loading-spinner"></div>
    <div class="loading-title">IntMap</div>
    <div class="loading-status" id="loading-status">Инициализация...</div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
    <div class="loading-percent" id="loading-percent">0%</div>
  </div>
  <div id="app-error" class="hidden">
    <div class="error-icon">❌</div>
    <div class="error-message" id="error-message"></div>
    <div class="error-hint">Произошла критическая ошибка. Попробуйте обновить страницу.</div>
  </div>
  <div id="debug">Loading...</div>
  <script src="bundle.js"></script>
</body>

</html>
